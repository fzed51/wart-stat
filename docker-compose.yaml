services:
  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wart-stat-frontend
    volumes:
      - dist:/app/dist:rw
    networks:
      - wart-stat-network
    restart: on-failure:3
    labels:
      - "com.example.description=Wart-Stat Frontend"
    develop:
      watch:
        - path: ./app
          action: rebuild
        - path: ./public
          action: rebuild
        - path: ./index.html
          action: rebuild

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: wart-stat-backend
    ports:
      - "80:80"
    networks:
      - wart-stat-network
    restart: unless-stopped

    volumes:
      - ./api:/app/api:rw
      - ./data:/app/data:rw
      - ./data:/app/logs:rw
      - ./report:/app/report:rw
      - dist:/app/dist:rw
    labels:
      - "com.example.description=Wart-Stat Backend API"
    depends_on:
      - frontend

networks:
  wart-stat-network:
    driver: bridge

volumes:
  dist:
    driver: local